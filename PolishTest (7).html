<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polish Grammar Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0f13; --surface:#16181f; --surface2:#1e2028; --border:#2a2d38;
  --accent:#7c9eff; --red:#ff7c7c; --green:#5cf5a0; --yellow:#ffd166;
  --text:#e8eaf0; --muted:#6b7080; --hint:#a0a8c0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,158,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,158,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.container{width:100%;max-width:780px;padding:32px 20px 80px;position:relative;z-index:1;}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;}
.header h1{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.header .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:0.05em;text-transform:uppercase;}
.score-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;text-align:right;min-width:130px;flex-shrink:0;cursor:pointer;transition:border-color 0.2s;}.score-panel:hover{border-color:var(--accent);}
.score-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;}
.score-value{font-size:26px;font-weight:800;color:var(--accent);line-height:1.1;}
.score-max{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.session-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 13px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.stat-chip .val{color:var(--text);font-weight:600;}


.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 32px 24px;margin-bottom:16px;position:relative;overflow:hidden;}
.ex-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
.ex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.ex-title{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;}
.ex-progress{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.paragraph-text{font-size:16px;font-weight:500;line-height:2.8;color:var(--text);}
.blank-group{display:inline-flex;align-items:stretch;vertical-align:middle;margin:0 2px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
.blank-group.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,158,255,0.15);}
.blank-group.state-correct{border-color:rgba(92,245,160,0.5);background:rgba(92,245,160,0.07);}
.blank-group.state-correct2{border-color:rgba(255,209,102,0.5);background:rgba(255,209,102,0.07);}
.blank-group.state-wrong{border-color:rgba(255,124,124,0.4);background:rgba(255,124,124,0.06);}
.blank-filled{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:4px 12px;display:none;}
.state-correct .blank-filled{display:inline;color:var(--green);}
.state-correct2 .blank-filled{display:inline;color:var(--yellow);}
.state-wrong .blank-filled{display:inline;color:var(--red);}
.state-correct .blank-opt,.state-correct2 .blank-opt,.state-wrong .blank-opt{display:none;}
.blank-opt{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:4px 9px;cursor:pointer;transition:background 0.15s,color 0.15s;border-left:1px solid var(--border);white-space:nowrap;user-select:none;display:inline-flex;align-items:center;}
.blank-opt:first-child{border-left:none;}
.blank-group.active .blank-opt{color:var(--hint);}
.blank-group.active .blank-opt:hover{background:rgba(124,158,255,0.12);color:var(--text);}
.blank-group:not(.active) .blank-opt{pointer-events:none;opacity:0.6;}
.blank-opt.opt-miss1{background:rgba(255,209,102,0.18)!important;color:var(--yellow)!important;text-decoration:line-through;opacity:0.7;}
.blank-opt.opt-miss2{background:rgba(255,124,124,0.2)!important;color:var(--red)!important;text-decoration:line-through;opacity:0.7;}
.blank-opt.opt-hit{background:rgba(92,245,160,0.2)!important;color:var(--green)!important;}
.hint-inline{display:none;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--yellow);border-left:1px solid var(--border);padding:4px 10px;white-space:nowrap;}
.hint-inline.visible{display:inline-flex;}
.hint-inline-text{color:var(--hint);}
.bottom-strip{display:flex;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.hint-btn{margin-left:auto;background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--yellow);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.hint-btn:hover:not(:disabled){border-color:var(--yellow);background:rgba(255,209,102,0.07);}
.hint-btn:disabled{opacity:0.3;cursor:default;}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;}
.btn{flex:1;min-width:140px;padding:14px 20px;border-radius:12px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none;}
.btn-primary{background:var(--accent);color:#0e0f13;}
.btn-primary:hover{background:#9bb3ff;transform:translateY(-1px);}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;flex:0;min-width:auto;padding:14px 16px;}
.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;}
.result-pct{font-size:72px;font-weight:800;line-height:1;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:24px;}
.result-legend{display:flex;justify-content:center;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.result-detail{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--hint);margin-bottom:32px;line-height:2;}
.result-detail span{color:var(--text);font-weight:600;}
.loading{text-align:center;padding:80px 20px;font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:13px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Polish Grammar Exam</h1>
      <div class="sub">Lisbon &amp; Sintra · Fill in the blanks</div>
    </div>
    <div class="score-panel" onclick="confirmReset()" title="Click to start new session">
      <div class="score-label">Session Score</div>
      <div class="score-value" id="sessionScore">0</div>
      <div class="score-max" id="sessionMax">/ 0 pts</div>
    </div>
  </div>
  <div class="session-bar">
    <div class="stat-chip">Done: <span class="val" id="statDone">0</span></div>
    <div class="stat-chip">Best: <span class="val" id="statBest">—</span></div>
  </div>
  <div id="mainArea"><div class="loading">Loading exercises</div></div>
</div>
<script>
const STORAGE_KEY = 'polish_exam_v4';
let exercises = [], currentEx = null;
let currentBlankIdx = 0;
let blankResults = [];
let shuffledOptionsMap = {};
let session = loadSession();

// Per-blank state — reset each time we move to a new blank
let B = { attempts: 0, hintUsed: false, locked: false };

function resetB() { B = { attempts: 0, hintUsed: false, locked: false }; }

function loadSession() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {totalScore:0,totalMax:0,done:0,best:null}; }
  catch { return {totalScore:0,totalMax:0,done:0,best:null}; }
}
function saveSession() { localStorage.setItem(STORAGE_KEY, JSON.stringify(session)); }
function updateSessionUI() {
  document.getElementById('sessionScore').textContent = session.totalScore;
  document.getElementById('sessionMax').textContent   = '/ ' + session.totalMax + ' pts';
  document.getElementById('statDone').textContent     = session.done;
  document.getElementById('statBest').textContent     = session.best !== null ? session.best + '%' : '—';
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function init() {
  updateSessionUI();
  try {
    const data = await fetch('paragraphs.json').then(r=>r.json());
    exercises = data.exercises;
    startRandom();
  } catch(e) {
    document.getElementById('mainArea').innerHTML='<div class="loading">Could not load paragraphs.json</div>';
  }
}

function startRandom() {
  currentEx          = exercises[Math.floor(Math.random()*exercises.length)];
  currentBlankIdx    = 0;
  blankResults       = new Array(currentEx.blanks.length).fill(null);
  shuffledOptionsMap = {};
  currentEx.blanks.forEach((b,i)=>{ shuffledOptionsMap[i]=shuffle(b.options); });
  resetB();
  render();
}

function render() {
  resetB();
  const total = currentEx.blanks.length;
  const done  = blankResults.filter(r=>r!==null).length;
  document.getElementById('mainArea').innerHTML = `
    <div class="fade-in">
      <div class="ex-card">
        <div class="ex-header">
          <span class="ex-title">${esc(currentEx.title)}</span>
          <span id="exProg" class="ex-progress">${done} / ${total} filled</span>
        </div>
        <div class="paragraph-text" id="paraText">${buildHtml()}</div>
        <div class="bottom-strip">
          <button class="hint-btn" id="hintBtn" onclick="useHint()">💡 Hint <span style="color:var(--muted)">−1pt</span></button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="startRandom()">↺ New paragraph</button>
      </div>
    </div>`;
  document.getElementById('paraText').addEventListener('click', onParaClick);
}

function buildHtml() {
  const parts = currentEx.template.split('___');
  let html = '';
  parts.forEach((part, i) => {
    html += esc(part);
    if (i >= parts.length-1) return;
    const res = blankResults[i];
    if (res !== null) {
      let cls = res.correct ? (res.firstTry ? 'state-correct' : 'state-correct2') : 'state-wrong';
      html += `<span class="blank-group ${cls}"><span class="blank-filled">${esc(currentEx.blanks[i].correct)}</span></span>`;
    } else if (i === currentBlankIdx) {
      const opts = shuffledOptionsMap[i];
      html += `<span class="blank-group active" id="bg_${i}">`;
      opts.forEach((opt,oi) => {
        html += `<span class="blank-opt" data-oi="${oi}">${esc(opt)}</span>`;
      });
      html += `<span class="hint-inline" id="hintInline">💡 <span class="hint-inline-text"></span></span>`;
      html += `</span>`;
    } else {
      const opts = shuffledOptionsMap[i];
      html += `<span class="blank-group">`;
      opts.forEach(o => { html += `<span class="blank-opt">${esc(o)}</span>`; });
      html += `</span>`;
    }
  });
  return html;
}

function onParaClick(e) {
  if (B.locked) return;
  const optEl = e.target.closest('.blank-opt');
  if (!optEl) return;
  const bg = optEl.closest('.blank-group');
  if (!bg || !bg.classList.contains('active')) return;
  const oi     = parseInt(optEl.dataset.oi);
  const chosen = shuffledOptionsMap[currentBlankIdx][oi];
  handleChoice(chosen, optEl);
}

function handleChoice(chosen, optEl) {
  const blank     = currentEx.blanks[currentBlankIdx];
  const isCorrect = chosen === blank.correct;
  B.attempts++;

  if (isCorrect) {
    optEl.classList.add('opt-hit');
    const pts = Math.max(0, (B.attempts === 1 ? 3 : 2) - (B.hintUsed ? 1 : 0));
    blankResults[currentBlankIdx] = { points: pts, correct: true, firstTry: B.attempts === 1 };
    B.locked = true;
    setTimeout(advance, 600);
  } else {
    if (B.attempts === 1) {
      optEl.classList.add('opt-miss1');
      // stay — wait for second attempt
    } else {
      // second wrong attempt
      optEl.classList.add('opt-miss2');
      blankResults[currentBlankIdx] = { points: 0, correct: false, firstTry: false };
      B.locked = true;
      setTimeout(advance, 900);
    }
  }
}

function useHint() {
  if (B.hintUsed) return;
  B.hintUsed = true;
  const el = document.getElementById('hintInline');
  if (el) {
    el.querySelector('.hint-inline-text').textContent = currentEx.blanks[currentBlankIdx].hint;
    el.classList.add('visible');
  }
  const btn = document.getElementById('hintBtn');
  if (btn) btn.disabled = true;
}

function advance() {
  currentBlankIdx++;
  if (currentBlankIdx >= currentEx.blanks.length) { showResult(); return; }
  resetB();
  const total = currentEx.blanks.length;
  const done  = blankResults.filter(r=>r!==null).length;
  document.getElementById('paraText').innerHTML = buildHtml();
  document.getElementById('exProg').textContent = done + ' / ' + total + ' filled';
  document.getElementById('hintBtn').disabled = false;
  // re-attach listener on new DOM
  document.getElementById('paraText').addEventListener('click', onParaClick);
}

function showResult() {
  const earned    = blankResults.reduce((s,r)=>s+(r?r.points:0),0);
  const maxP      = currentEx.blanks.length * 3;
  const pct       = Math.round(earned/maxP*100);
  const firstTry  = blankResults.filter(r=>r&&r.correct&&r.firstTry).length;
  const secondTry = blankResults.filter(r=>r&&r.correct&&!r.firstTry).length;
  const wrong     = blankResults.filter(r=>r&&!r.correct).length;
  session.totalScore += earned; session.totalMax += maxP; session.done++;
  if (session.best===null||pct>session.best) session.best=pct;
  saveSession(); updateSessionUI();
  document.getElementById('mainArea').innerHTML = `
    <div class="result-card fade-in">
      <div class="result-pct">${pct}%</div>
      <div class="result-label">${esc(currentEx.title)}</div>
      <div class="result-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>First try: ${firstTry}</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Second try: ${secondTry}</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Wrong: ${wrong}</div>
      </div>
      <div class="result-detail">Points: <span>${earned} / ${maxP}</span><br>First-try correct: <span>${firstTry} / ${currentEx.blanks.length}</span></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="startRandom()">New Paragraph →</button>
        <button class="btn btn-secondary" onclick="retry()">↺ Retry this</button>
      </div>
    </div>`;
}

function retry() {
  currentBlankIdx    = 0;
  blankResults       = new Array(currentEx.blanks.length).fill(null);
  shuffledOptionsMap = {};
  currentEx.blanks.forEach((b,i)=>{ shuffledOptionsMap[i]=shuffle(b.options); });
  render();
}

function confirmReset() {
  if (confirm('Start a new session? Current scores will be reset.')) {
    session={totalScore:0,totalMax:0,done:0,best:null};
    saveSession(); updateSessionUI();
  }
}

init();
</script>
</body>
</html>
